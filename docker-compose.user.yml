version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: npm run dev
    depends_on:
      - app

  app:
    build: .
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - PRAESAGUS_S3_ENDPOINT=http://localstack:4566
      - PRAESAGUS_DDB_ENDPOINT=http://localstack:4566
      - PRAESAGUS_S3_BUCKET=praesagus-raw-data-local
      - PRAESAGUS_FEATURE_TABLE=praesagus-feature-store-local
    depends_on:
      - localstack

  localstack:
    image: localstack/localstack:1.4
    ports:
      - "4566:4566"
      - "4571:4571"
    environment:
      - SERVICES=s3,dynamodb
      - DEFAULT_REGION=us-east-1
    volumes:
      - ./localstack:/var/lib/localstack
